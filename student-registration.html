<!DOCTYPE html>
<html>
  <h1>
    Student Registration Form
  </h1>

  <form>
    <label>Full Name:</label>
    <input type="text">

    <br>
    <label>Email:</label>
    <input type="email">

    <br>
    <label>Phone Number:</label>
    <input type="tel">

    <br>
    <label>Course Selection:</label>
    <select>
      <option value="course1">Machine Learning</option>
      <option value="course2">Artificial Intelligence</option>
      <option value="course3">Data Science</option>
    </select>

    <br>

    <label>Gender:</label>
    <input type="radio" name="gender" value="male"> Male  
    <input type="radio" name="gender" value="female"> Female

    <br>
    <label>Interests:</label>
    <input type="checkbox" name="interest" value="webdev"> Web Development
    <input type="checkbox" name="interest" value="datasci"> Data Science

    <br>
    <label>Additional Comments:</label>
    <textarea></textarea>

    <br>
    <button> Submit </button>
    
  </form>
</html>
