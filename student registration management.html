<!DOCTYPE html>
<html>
  <head>
    <title>
      Student Registration Management
    </title>

  </head>

  <body>
    <form>
      <label>
        Full Name:
        <input type="text" name ="fullName">
      </label>

      <br>

      <label>
        Email:
        <input type="email" name="email">
      </label>

      <br>

      <label>
        Password:
        <input type="password" name ="password">
      </label>

      <br>
      <label>
        Age:
        <input type="number" name="age">
      </label>

      <br>

      <label>
        Gender:
        <input type="radio" name="gender" value="Male">
        Male
        <input type ="radio" name="gender" value="Female">
        Female
      </label>

      <br>

      <label>
        Course Selection:
        <select name="course">
          <option value="course1" >Machine Learning </option>
          <option value="course2" >Web Development </option>
          <option value="course3" >Data Science </option>
        </select>
      </label>

      <br>

      <label>
        Skills:
        <input type="checkbox" name="skills" value="Python">
         Python
        <input type="checkbox" name="skills" value="Javascript">
        Javascript
        <input type="checkbox" name="skills" value="PHP">
        PHP
      </label>

      <br>

      <label>
        About Yourself:
        <textarea name="about yourself"></textarea>
      </label>

      <br>

    </form>

    <button type="Submit">
      Register
    </button>

    <br>
  </body>
  </html>
