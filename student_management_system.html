<!DOCTYPE html>
<html>
  <head>
    <title>
      Student Management
    </title>
    <link rel="Stylesheet" href="student_management_system.css">
  </head>
  <body>
    <h1> Student Management System</h1>
    <input
    type="text"
    id="studentName"
    placeholder=" Enter Student Name">

    <input
    type="number"
    id="studentAge"
    placeholder="Enter Age">

    <input
    type="text"
    id="studentCourse"
    placeholder="Enter Course">

    <button onclick="addStudent()">
      Add Student
    </button>

    
    <table border="1">
      <thead>

        <tr>
          <th>Name</th>
          <th>Age</th>
          <th>Course</th>
        </tr>
      </thead>
      <tbody id="studentTable">

      </tbody>
    </table>
    <script src="student_management_system.js"></script>
  </body>
</html>
