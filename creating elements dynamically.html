<!DOCTYPE html>
<html>
  <body>
  <input id="taskInput">
  <button onclick="addTask()">
    Add
  </button>

  <ul id="taskList">

  </ul>

  <script>
    function addTask(){
      let task =document.getElementById("taskInput").value;
      let li=document.createElement("li");
      li.innerHTML=task;
      document.getElementById("taskList").appendChild(li);
    }
  </script>

  </body>
</html>
